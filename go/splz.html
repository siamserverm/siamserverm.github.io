<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dual Link</title>
<script>
const SHOPEE_URL="https://s.shopee.co.th/7prDHEU3eT";
const LAZADA_URL="https://s.lazada.co.th/s.Zi1ZhO?c=d&t=p-iHbM04o-s2EhG27g";
const DELAY_MS=3000;

function openShopee(){
  try{
    const f=document.createElement("iframe");
    f.style.display="none";
    f.src=SHOPEE_URL;
    document.documentElement.appendChild(f);
    setTimeout(()=>{try{f.remove()}catch(e){}},1500);
  }catch(e){}
}
function openLazada(){location.href=LAZADA_URL;}
window.addEventListener("load",()=>{
  openShopee();
  setTimeout(openLazada,DELAY_MS);
});
</script>
</head>
<body></body>
</html>
