<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กำลังเปิดแอป</title>
<style>
html,body{margin:0;min-height:100%;font-family:Arial,"Noto Sans Thai",sans-serif;background:#fff}
body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.status{font-size:20px;font-weight:700}
</style>
</head>
<body>
<div class="status">กำลังเปิด Shopee และ Lazada…</div>
<script>
const shopeeUrl="https://s.shopee.co.th/4AyQcwWfXG";
const lazadaUrl="https://s.lazada.co.th/s.ZiYF7H?c=d&t=p-iHbM04o-s2EhG27g";

function runAutoFlow(){
  const stage=sessionStorage.getItem('dualRedirectStage')||'start';

  if(stage==='start'){
    if(confirm('ยืนยันเพื่อเปิด Shopee หรือไม่?')){
      sessionStorage.setItem('dualRedirectStage','shopee_opened');
      window.location.href=shopeeUrl;
    }
    return;
  }

  if(stage==='shopee_opened'){
    sessionStorage.setItem('dualRedirectStage','done');
    setTimeout(function(){
      if(confirm('ยืนยันเพื่อเปิด Lazada ต่อหรือไม่?')){
        window.location.href=lazadaUrl;
      }
    },300);
    return;
  }

  sessionStorage.removeItem('dualRedirectStage');
}

window.addEventListener('pageshow',runAutoFlow);
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){
    setTimeout(runAutoFlow,300);
  }
});
</script>
</body>
</html>
