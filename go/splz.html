<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>สินค้าแนะนำ</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{
  margin:0;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;
  padding:clamp(6px,2.5vw,20px);background:#f4f6f8;color:#111827;
  font-family:Arial,"Noto Sans Thai",sans-serif
}
.product{
  width:100%;max-width:440px;margin:0 auto;background:#fff;border-radius:20px;
  overflow:hidden;box-shadow:0 16px 45px rgba(0,0,0,.14);min-width:0
}
.product img{
  width:100%;height:auto;max-height:62dvh;aspect-ratio:1/1;
  object-fit:cover;background:#e5e7eb;display:block
}
.content{padding:clamp(14px,4vw,20px);min-width:0}
h1{font-size:clamp(22px,6vw,24px);margin:0 0 10px;overflow-wrap:anywhere}
.desc{color:#4b5563;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere}
.disclosure{
  margin:15px 0;padding:12px;border-radius:11px;background:#f3f4f6;
  color:#4b5563;font-size:13px;line-height:1.55;overflow-wrap:anywhere
}
a{
  display:block;width:100%;text-align:center;text-decoration:none;color:#fff;
  padding:14px 10px;border-radius:12px;font-weight:800;margin-top:11px;
  overflow-wrap:anywhere
}
.shopee{background:#ee4d2d}.lazada{background:#5f2eea}
@media(max-width:480px){
  body{padding:0;background:#fff}
  .product{max-width:none;border-radius:0;box-shadow:none}
  .product img{max-height:55dvh}
  .content{padding:16px}
}
@media(max-width:360px){
  .content{padding:12px}
  a{padding:13px 8px}
}
</style>
