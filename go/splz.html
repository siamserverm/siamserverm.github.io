<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กดที่นี่เพื่อดูสินค้า</title>
<style>
html,body{
  margin:0;
  min-height:100%;
  font-family:Arial,"Noto Sans Thai",sans-serif;
  background:#ffffff;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
#dualLink{
  font-size:28px;
  font-weight:800;
  color:#1769ff;
  text-decoration:underline;
  cursor:pointer;
  text-align:center;
}
</style>
</head>
<body>
<a id="dualLink" href="#">กดที่นี่เพื่อดูสินค้า</a>
<script>
const shopeeUrl = "https://s.shopee.co.th/9UzwuFb4Xg";
const lazadaUrl = "https://s.lazada.co.th/s.ZiYH5j?c=d&t=p-iHbM04o-s2EhG27g";
const delayMs = 3000;

document.getElementById('dualLink').addEventListener('click', function(event){
  event.preventDefault();

  if(confirm('ยืนยันเพื่อเปิดลิงก์ Shopee หรือไม่?')){
    window.open(shopeeUrl, '_blank', 'noopener');

    setTimeout(function(){
      if(confirm('ครบเวลาแล้ว ยืนยันเพื่อเปิดลิงก์ Lazada หรือไม่?')){
        window.location.href = lazadaUrl;
      }
    }, delayMs);
  }
});
</script>
</body>
</html>
