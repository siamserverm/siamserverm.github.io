<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>กำลังเปิดแอพ</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,"Noto Sans Thai",sans-serif;background:#fff}
body{display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.box{width:min(420px,100%);padding:24px;border-radius:18px;background:#fff;box-shadow:0 12px 40px rgba(0,0,0,.14)}
h2{margin:0 0 10px}.status{color:#555;line-height:1.6}.fallback{display:none;margin-top:16px}
button{width:100%;border:0;border-radius:12px;padding:14px;font-size:17px;font-weight:800;color:#fff;background:#ee4d2d}
</style>
</head>
<body>
<div class="box">
  <h2>กำลังเปิด Shopee</h2>
  <div class="status">ระบบจะเปิด Lazada ต่อใน 3 วินาที ไม่ว่าจะเปิด Shopee สำเร็จหรือไม่</div>
  <div class="fallback" id="fallback">
    <button id="manualShopee">เปิด Shopee ด้วยตนเอง</button>
  </div>
</div>

<script>
const SHOPEE="https://s.shopee.co.th/4AyQcwWfXG";
const LAZADA="https://s.lazada.co.th/s.ZiYwOb?c=c&t=p-iHbM04o-s2EhG27g";
const DELAY=3000;

function openShopee(){
  let popup=null;
  try{
    popup=window.open(SHOPEE,'_blank','noopener,noreferrer');
  }catch(e){}

  if(!popup){
    document.getElementById('fallback').style.display='block';
  }
}

document.getElementById('manualShopee').addEventListener('click',function(){
  window.open(SHOPEE,'_blank','noopener,noreferrer');
});

window.addEventListener('load',function(){
  openShopee();

  setTimeout(function(){
    window.location.replace(LAZADA);
  },DELAY);
});
</script>
</body>
</html>
