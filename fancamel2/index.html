Key()+'/'+slug+'/'+id),{platform:platform,slug:slug,url:url,createdAt:new Date().toISOString(),path:location.pathname,ua:navigator.userAgent,sessionId:sid(),workspaceId:WORKSPACE_ID,workspaceName:WORKSPACE_NAME});if(window.fbq)fbq('trackCustom','Click'+platform);if(window.gtag){gtag('event','affiliate_click',{platform:platform,landing_slug:slug,link_url:url});gtag('event',platform+'_click',{landing_slug:slug,link_url:url});}}catch(e){}}function setAutoStatus(t){var el=document.getElementById('autoStatus');if(el)el.textContent=t}
