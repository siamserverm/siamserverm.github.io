[slug].total=(data[slug].total||0)+1;data[slug].lastClickAt=new Date().toISOString();localStorage.setItem(key,JSON.stringify(data));var id=Date.now()+'-'+Math.random().toString(36).slice(2);fbPut(wsPath('clicks/'+dayKey()+'/'+slug+'/'+id),{platform:platform,slug:slug,url:url,createdAt:new Date().toISOString(),path:location.pathname,ua:navigator.userAgent,sessionId:sid(),workspaceId:WORKSPACE_ID,workspaceName:WORKSPACE_NAME});if(window.fbq)fbq('trackCustom','Click'+platform);if(window.gtag){gtag('event','affiliate_click',{platform:platform,landing_slug:slug,link_url:url});gtag('event',platform+'_click',{landing_slug:slug,link_url:url});}}catch(e){}}function setAutoStatus(t){var el=document.getElementById('autoStatus');if(el)el.textContent=t}
